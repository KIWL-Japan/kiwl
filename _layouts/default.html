<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    {% if page.has_gpx_map %}
      <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
      >
      <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
      ></script>
      <script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>
    {% endif %}
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ "/" | relative_url }}">KIWL</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ "/" | relative_url }}">Home</a>
        <a href="{{ "/about/" | relative_url }}">About Us</a>
        <a href="{{ "/gpx-routes/" | relative_url }}">GPX Routes</a>
        <a href="{{ "/news/" | relative_url }}">News</a>
        <a href="{{ "/contact/" | relative_url }}">Contact Us</a>
      </nav>
    </header>

    <main class="page-content{% if page.url == '/' %} page-content-home{% endif %}">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ "now" | date: "%Y" }} KIWL. Raising funds for Mirai no Mori.</p>
    </footer>
  </body>
</html>
